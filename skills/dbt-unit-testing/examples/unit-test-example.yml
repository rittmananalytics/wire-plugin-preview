# Simple Unit Test Example
# Model: stg_shopify__orders
# Tests: Status normalization logic in a staging model
#
# The staging model normalizes Shopify order statuses from various
# raw values into a consistent set of status categories.

unit_tests:
  - name: test_stg_shopify__orders__status_normalization
    description: >
      Verify that raw Shopify order statuses are correctly normalized
      to our standard status categories (active, complete, cancelled, unknown).
    model: stg_shopify__orders
    given:
      - input: source('shopify', 'orders')
        rows:
          - {id: 1, status: "fulfilled", financial_status: "paid", created_at: "2024-01-15 10:00:00"}
          - {id: 2, status: "unfulfilled", financial_status: "pending", created_at: "2024-01-16 09:00:00"}
          - {id: 3, status: "cancelled", financial_status: "refunded", created_at: "2024-01-17 14:30:00"}
          - {id: 4, status: "restocked", financial_status: "voided", created_at: "2024-01-18 08:00:00"}
          - {id: 5, status: "unexpected_value", financial_status: "paid", created_at: "2024-01-19 11:00:00"}
    expect:
      rows:
        - {order_id: 1, order_status: "complete", payment_status: "paid", ordered_at: "2024-01-15 10:00:00"}
        - {order_id: 2, order_status: "active", payment_status: "pending", ordered_at: "2024-01-16 09:00:00"}
        - {order_id: 3, order_status: "cancelled", payment_status: "refunded", ordered_at: "2024-01-17 14:30:00"}
        - {order_id: 4, order_status: "cancelled", payment_status: "voided", ordered_at: "2024-01-18 08:00:00"}
        - {order_id: 5, order_status: "unknown", payment_status: "paid", ordered_at: "2024-01-19 11:00:00"}

  - name: test_stg_shopify__orders__null_status_handling
    description: >
      Verify that NULL statuses are handled gracefully and default to 'unknown'.
    model: stg_shopify__orders
    given:
      - input: source('shopify', 'orders')
        rows:
          - {id: 10, status: null, financial_status: null, created_at: "2024-02-01 12:00:00"}
    expect:
      rows:
        - {order_id: 10, order_status: "unknown", payment_status: "unknown", ordered_at: "2024-02-01 12:00:00"}

  - name: test_stg_shopify__orders__empty_input
    description: >
      Verify the model handles empty input without errors.
    model: stg_shopify__orders
    given:
      - input: source('shopify', 'orders')
        rows: []
    expect:
      rows: []
