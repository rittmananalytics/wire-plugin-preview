wire_schema: "1.0"
id: dbt_development
name: "dbt Development"
description: "Focused dbt-only delivery — data model design, dbt build, semantic layer, data quality testing, and deployment — without the full pipeline and BI scope of a full platform release."
applicable_when:
  - "Client already has ingestion in place and only needs the transformation layer built or rebuilt"
  - "Scope is dbt models, semantic layer, and dbt tests — not a full pipeline build"
  - "Client is migrating from an existing dbt project (non-migration release) or starting a net-new dbt layer"

phases:
  - id: requirements
    name: "Requirements"
    description: "Capture dbt-specific requirements from the SoW and stakeholder input"
    required: true
    requires_phase: null
    artifacts:
      - id: requirements
        command: requirements
        required: true
        sequence: 1
        depends_on: []

  - id: design
    name: "Design"
    description: "Design the dbt data model — staging, integration, and warehouse layers"
    required: true
    requires_phase: requirements
    artifacts:
      - id: data_model
        command: data_model
        required: true
        sequence: 1
        depends_on:
          - artifact: requirements
            action: review
            outcome: approved

  - id: development
    name: "Development"
    description: "Build dbt models and semantic layer"
    required: true
    requires_phase: design
    artifacts:
      - id: dbt
        command: dbt
        required: true
        sequence: 1
        depends_on:
          - artifact: data_model
            action: review
            outcome: approved
      - id: semantic_layer
        command: semantic_layer
        required: false
        sequence: 2
        depends_on:
          - artifact: dbt
            action: validate
            outcome: PASS

  - id: testing
    name: "Testing"
    description: "Run dbt tests and data quality checks"
    required: true
    requires_phase: development
    artifacts:
      - id: data_quality
        command: data_quality
        required: true
        sequence: 1
        depends_on:
          - artifact: dbt
            action: review
            outcome: approved

  - id: deployment
    name: "Deployment"
    description: "Deploy dbt project to production environment"
    required: true
    requires_phase: testing
    artifacts:
      - id: deployment
        command: deployment
        required: true
        sequence: 1
        depends_on:
          - artifact: data_quality
            action: validate
            outcome: PASS
